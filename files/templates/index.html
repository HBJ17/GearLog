<!DOCTYPE html>
<html>
<head>
    <title>Jobcard System</title>
</head>
<body>

<h1>Jobcard Dashboard</h1>

<button onclick="window.location.href='/add'">
    Add Jobcard
</button>

<br><br>

<button onclick="loadJobs()">
    View Active Jobcards
</button>

<div id="output"></div>

<script>
function loadJobs() {
    fetch('/view')
    .then(res => res.text())
    .then(data => {
        document.getElementById("output").innerHTML = "<pre>" + data + "</pre>";
    });
}
</script>

</body>
</html>
