<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Check Service{% endblock %} – MotoService</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
    <style>
        .user-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .user-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .user-header h1 {
            font-size: 2rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .user-header p {
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <main class="user-page">
        <div class="user-header">
            <h1>MotoService</h1>
            <p>Track your vehicle service status</p>
        </div>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
